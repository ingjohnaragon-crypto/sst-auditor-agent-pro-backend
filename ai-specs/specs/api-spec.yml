openapi: 3.1.0
info:
  title: SST Auditor Agent Pro — Backend API
  version: "0.1.0"
  description: >
    Especificación de referencia de los endpoints expuestos por el backend.
    Se actualiza en cada ticket que agregue o modifique endpoints.
paths:
  /health:
    get:
      summary: Verifica que la aplicación y el enrutador raíz están operativos
      tags: [Health]
      responses:
        "200":
          description: La aplicación está operativa
          content:
            application/json:
              schema:
                type: object
                required: [status, app, version]
                properties:
                  status:
                    type: string
                    example: ok
                  app:
                    type: string
                    example: SST Auditor Agent Pro
                  version:
                    type: string
                    example: "0.1.0"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/ping:
    get:
      summary: Endpoint de conectividad para validar la comunicación con el frontend
      description: >
        Responde "pong" sin realizar I/O. El frontend Angular (http://localhost:4200)
        lo usa para validar la comunicación cross-origin (CORS).
      tags: [Salud]
      responses:
        "200":
          description: Conectividad verificada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaPing"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/auth/login:
    post:
      summary: Inicia sesión y emite el par de tokens (acceso + refresco)
      tags: [Autenticación]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolicitudLogin"
      responses:
        "200":
          description: Credenciales válidas — tokens emitidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaTokens"
        "401":
          description: Credenciales inválidas (CREDENCIALES_INVALIDAS)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        "422":
          description: Body inválido (ERROR_VALIDACION)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/auth/refresh:
    post:
      summary: Renueva el token de acceso a partir del token de refresco
      tags: [Autenticación]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolicitudRefresh"
      responses:
        "200":
          description: Token de refresco válido — nuevo token de acceso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaTokenAcceso"
        "401":
          description: >
            Token inválido o expirado (TOKEN_INVALIDO, TOKEN_EXPIRADO)
            o usuario inactivo (CREDENCIALES_INVALIDAS)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        "422":
          description: Body inválido (ERROR_VALIDACION)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/auth/yo:
    get:
      summary: Devuelve el perfil del usuario autenticado
      tags: [Autenticación]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Perfil del usuario del Bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaUsuario"
        "401":
          description: >
            Sin token, token corrupto, expirado o de tipo refresco
            (TOKEN_INVALIDO / TOKEN_EXPIRADO)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT de acceso (claim `tipo=acceso`). No aceptar tokens de refresco.
  schemas:
    RespuestaPing:
      type: object
      description: Respuesta del endpoint de conectividad ping/pong.
      required: [mensaje]
      properties:
        mensaje:
          type: string
          example: pong
    SolicitudLogin:
      type: object
      description: Credenciales de inicio de sesión.
      required: [correo, contrasena]
      properties:
        correo:
          type: string
          format: email
          example: admin@empresa.com
        contrasena:
          type: string
          format: password
          minLength: 8
          writeOnly: true
    SolicitudRefresh:
      type: object
      description: Token de refresco para renovar el acceso.
      required: [token_refresco]
      properties:
        token_refresco:
          type: string
          description: JWT con claim `tipo=refresco`
    RespuestaTokens:
      type: object
      description: Par de tokens emitido al iniciar sesión.
      required: [token_acceso, token_refresco, tipo_token, expira_en_segundos]
      properties:
        token_acceso:
          type: string
        token_refresco:
          type: string
        tipo_token:
          type: string
          example: Bearer
        expira_en_segundos:
          type: integer
          example: 1800
    RespuestaTokenAcceso:
      type: object
      description: Nuevo token de acceso emitido al refrescar.
      required: [token_acceso, tipo_token, expira_en_segundos]
      properties:
        token_acceso:
          type: string
        tipo_token:
          type: string
          example: Bearer
        expira_en_segundos:
          type: integer
          example: 1800
    RespuestaUsuario:
      type: object
      description: Perfil público del usuario (sin hash de contraseña).
      required: [id, nombre_completo, correo, rol]
      properties:
        id:
          type: string
          format: uuid
        nombre_completo:
          type: string
          example: Ana Auditora
        correo:
          type: string
          format: email
          example: ana@empresa.com
        rol:
          type: string
          enum: [ADMINISTRADOR, AUDITOR_SST, CONSULTA]
    RespuestaError:
      type: object
      description: >
        Contrato único de toda respuesta de error del API (4xx y 5xx).
        Todas las rutas presentes y futuras responden errores con este esquema.
      required: [exito, codigo, mensaje]
      properties:
        exito:
          type: boolean
          description: Siempre `false` en respuestas de error.
          example: false
        codigo:
          type: string
          description: >
            Código estable en mayúsculas: ERROR_DOMINIO, ERROR_VALIDACION,
            ERROR_HTTP, ERROR_INTERNO o el código específico de una subclase
            de DomainException.
          example: ERROR_VALIDACION
        mensaje:
          type: string
          description: Descripción legible del error, en español.
          example: La petición contiene datos inválidos.
        detalle:
          description: >
            Información adicional (p. ej. errores de campo de Pydantic).
            `null` cuando no aplica.
          oneOf:
            - type: array
              items:
                type: object
            - type: object
            - type: "null"
  responses:
    ErrorPorDefecto:
      description: Respuesta de error con el esquema único `RespuestaError`.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RespuestaError"
          examples:
            errorValidacion:
              summary: 422 — error de validación
              value:
                exito: false
                codigo: ERROR_VALIDACION
                mensaje: La petición contiene datos inválidos.
                detalle:
                  - loc: [body, name]
                    msg: Field required
                    type: missing
            errorInterno:
              summary: 500 — error no controlado
              value:
                exito: false
                codigo: ERROR_INTERNO
                mensaje: Ha ocurrido un error interno. Contacte al administrador.
                detalle: null
