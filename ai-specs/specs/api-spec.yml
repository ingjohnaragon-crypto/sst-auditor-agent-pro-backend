openapi: 3.1.0
info:
  title: SST Auditor Agent Pro — Backend API
  version: "0.1.0"
  description: >
    Especificación de referencia de los endpoints expuestos por el backend.
    Se actualiza en cada ticket que agregue o modifique endpoints.
paths:
  /health:
    get:
      summary: Verifica que la aplicación y el enrutador raíz están operativos
      tags: [Health]
      responses:
        "200":
          description: La aplicación está operativa
          content:
            application/json:
              schema:
                type: object
                required: [status, app, version]
                properties:
                  status:
                    type: string
                    example: ok
                  app:
                    type: string
                    example: SST Auditor Agent Pro
                  version:
                    type: string
                    example: "0.1.0"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/ping:
    get:
      summary: Endpoint de conectividad para validar la comunicación con el frontend
      description: >
        Responde "pong" sin realizar I/O. El frontend Angular (http://localhost:4200)
        lo usa para validar la comunicación cross-origin (CORS).
      tags: [Salud]
      responses:
        "200":
          description: Conectividad verificada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaPing"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/auth/login:
    post:
      summary: Inicia sesión y emite el par de tokens (acceso + refresco)
      tags: [Autenticación]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolicitudLogin"
      responses:
        "200":
          description: Credenciales válidas — tokens emitidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaTokens"
        "401":
          description: Credenciales inválidas (CREDENCIALES_INVALIDAS)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        "422":
          description: Body inválido (ERROR_VALIDACION)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/auth/refresh:
    post:
      summary: Renueva el token de acceso a partir del token de refresco
      tags: [Autenticación]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolicitudRefresh"
      responses:
        "200":
          description: Token de refresco válido — nuevo token de acceso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaTokenAcceso"
        "401":
          description: >
            Token inválido o expirado (TOKEN_INVALIDO, TOKEN_EXPIRADO)
            o usuario inactivo (CREDENCIALES_INVALIDAS)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        "422":
          description: Body inválido (ERROR_VALIDACION)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/auth/yo:
    get:
      summary: Devuelve el perfil del usuario autenticado
      tags: [Autenticación]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Perfil del usuario del Bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaUsuario"
        "401":
          description: >
            Sin token, token corrupto, expirado o de tipo refresco
            (TOKEN_INVALIDO / TOKEN_EXPIRADO)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/empresas:
    post:
      summary: Crea una empresa
      tags: [Empresas]
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolicitudCrearEmpresa"
      responses:
        "201":
          description: Empresa creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaEmpresa"
        "403":
          description: ACCESO_DENEGADO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        "409":
          description: NIT_DUPLICADO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"
    get:
      summary: Lista empresas
      tags: [Empresas]
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Listado
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RespuestaEmpresa"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/empresas/{id}:
    get:
      summary: Obtiene una empresa por id
      tags: [Empresas]
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: Empresa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaEmpresa"
        "404":
          description: EMPRESA_NO_ENCONTRADA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/estandares-minimos:
    get:
      summary: Lista el catálogo de estándares mínimos (Res. 0312)
      tags: [Estándares]
      security: [{bearerAuth: []}]
      parameters:
        - name: ciclo_phva
          in: query
          required: false
          schema:
            type: string
            enum: [PLANEAR, HACER, VERIFICAR, ACTUAR]
      responses:
        "200":
          description: Catálogo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RespuestaEstandarMinimo"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/autoevaluaciones:
    post:
      summary: Crea una autoevaluación (usuario_id desde el token)
      tags: [Autoevaluaciones]
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolicitudCrearAutoevaluacion"
      responses:
        "201":
          description: Autoevaluación creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaAutoevaluacion"
        "403":
          description: ACCESO_DENEGADO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        "404":
          description: EMPRESA_NO_ENCONTRADA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"
    get:
      summary: Histórico de autoevaluaciones por empresa
      tags: [Autoevaluaciones]
      security: [{bearerAuth: []}]
      parameters:
        - name: empresa_id
          in: query
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: Histórico (sin calificaciones embebidas)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RespuestaAutoevaluacion"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/autoevaluaciones/{id}:
    get:
      summary: Detalle de autoevaluación con calificaciones
      tags: [Autoevaluaciones]
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: Detalle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaAutoevaluacion"
        "404":
          description: AUTOEVALUACION_NO_ENCONTRADA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/autoevaluaciones/{id}/calificaciones/{estandar_id}:
    put:
      summary: Upsert de calificación de un estándar (puntaje derivado en servidor)
      tags: [Autoevaluaciones]
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
        - name: estandar_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolicitudCalificarEstandar"
      responses:
        "200":
          description: Calificación guardada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaCalificacionEstandar"
        "403":
          description: ACCESO_DENEGADO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        "404":
          description: AUTOEVALUACION_NO_ENCONTRADA / ESTANDAR_NO_ENCONTRADO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        "409":
          description: AUTOEVALUACION_FINALIZADA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/autoevaluaciones/{id}/finalizar:
    post:
      summary: Finaliza la autoevaluación (puntaje_total y requiere_plan_mejora)
      tags: [Autoevaluaciones]
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: Autoevaluación finalizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaAutoevaluacion"
        "403":
          description: ACCESO_DENEGADO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        "409":
          description: AUTOEVALUACION_INCOMPLETA / AUTOEVALUACION_FINALIZADA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/empresas/{empresa_id}/matriz-riesgos:
    get:
      summary: Vista agregada de la matriz GTC 45
      tags: [Matriz de riesgos GTC 45]
      security: [{bearerAuth: []}]
      parameters:
        - name: empresa_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: Matriz jerárquica procesos→peligros→evaluación→controles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaMatrizRiesgos"
        "404":
          description: EMPRESA_NO_ENCONTRADA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/empresas/{empresa_id}/procesos-actividades:
    get:
      summary: Lista procesos/actividades de una empresa
      tags: [Matriz de riesgos GTC 45]
      security: [{bearerAuth: []}]
      parameters:
        - name: empresa_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: Lista de procesos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RespuestaProcesoActividad"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"
    post:
      summary: Crea un proceso/actividad
      tags: [Matriz de riesgos GTC 45]
      security: [{bearerAuth: []}]
      parameters:
        - name: empresa_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolicitudCrearProcesoActividad"
      responses:
        "201":
          description: Proceso creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaProcesoActividad"
        "403":
          description: ACCESO_DENEGADO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/procesos-actividades/{id}:
    get:
      summary: Obtiene un proceso/actividad
      tags: [Matriz de riesgos GTC 45]
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: Detalle del proceso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaProcesoActividad"
        "404":
          description: PROCESO_NO_ENCONTRADO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"
    patch:
      summary: Actualiza un proceso/actividad
      tags: [Matriz de riesgos GTC 45]
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolicitudActualizarProcesoActividad"
      responses:
        "200":
          description: Proceso actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaProcesoActividad"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"
    delete:
      summary: Elimina un proceso (CASCADE a peligros/evaluación/controles)
      tags: [Matriz de riesgos GTC 45]
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "204":
          description: Eliminado
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/procesos-actividades/{id}/peligros:
    get:
      summary: Lista peligros de un proceso
      tags: [Matriz de riesgos GTC 45]
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: Lista de peligros
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RespuestaPeligro"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"
    post:
      summary: Crea un peligro
      tags: [Matriz de riesgos GTC 45]
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolicitudCrearPeligro"
      responses:
        "201":
          description: Peligro creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaPeligro"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/peligros/{id}:
    get:
      summary: Obtiene un peligro
      tags: [Matriz de riesgos GTC 45]
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: Detalle del peligro
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaPeligro"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"
    patch:
      summary: Actualiza un peligro
      tags: [Matriz de riesgos GTC 45]
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolicitudActualizarPeligro"
      responses:
        "200":
          description: Peligro actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaPeligro"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"
    delete:
      summary: Elimina un peligro (CASCADE a evaluación/controles)
      tags: [Matriz de riesgos GTC 45]
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "204":
          description: Eliminado
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/peligros/{id}/evaluacion:
    get:
      summary: Obtiene la evaluación de un peligro
      tags: [Matriz de riesgos GTC 45]
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: Evaluación con derivados NP/NR
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaEvaluacionRiesgo"
        "404":
          description: EVALUACION_NO_ENCONTRADA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"
    put:
      summary: Crea o reemplaza la evaluación (solo ND/NE/NC en body)
      tags: [Matriz de riesgos GTC 45]
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolicitudUpsertEvaluacion"
      responses:
        "200":
          description: Evaluación actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaEvaluacionRiesgo"
        "201":
          description: Evaluación creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaEvaluacionRiesgo"
        "422":
          description: VALOR_GTC_INVALIDO / extra fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaError"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/evaluaciones-riesgo/{id}/controles:
    get:
      summary: Lista controles de una evaluación
      tags: [Matriz de riesgos GTC 45]
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: Lista de controles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RespuestaControlRiesgo"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"
    post:
      summary: Agrega un control
      tags: [Matriz de riesgos GTC 45]
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolicitudCrearControl"
      responses:
        "201":
          description: Control creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaControlRiesgo"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

  /api/v1/controles-riesgo/{id}:
    patch:
      summary: Actualiza un control
      tags: [Matriz de riesgos GTC 45]
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolicitudActualizarControl"
      responses:
        "200":
          description: Control actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaControlRiesgo"
        default:
          $ref: "#/components/responses/ErrorPorDefecto"
    delete:
      summary: Elimina un control
      tags: [Matriz de riesgos GTC 45]
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "204":
          description: Eliminado
        default:
          $ref: "#/components/responses/ErrorPorDefecto"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT de acceso (claim `tipo=acceso`). No aceptar tokens de refresco.
  schemas:
    RespuestaPing:
      type: object
      description: Respuesta del endpoint de conectividad ping/pong.
      required: [mensaje]
      properties:
        mensaje:
          type: string
          example: pong
    SolicitudLogin:
      type: object
      description: Credenciales de inicio de sesión.
      required: [correo, contrasena]
      properties:
        correo:
          type: string
          format: email
          example: admin@empresa.com
        contrasena:
          type: string
          format: password
          minLength: 8
          writeOnly: true
    SolicitudRefresh:
      type: object
      description: Token de refresco para renovar el acceso.
      required: [token_refresco]
      properties:
        token_refresco:
          type: string
          description: JWT con claim `tipo=refresco`
    RespuestaTokens:
      type: object
      description: Par de tokens emitido al iniciar sesión.
      required: [token_acceso, token_refresco, tipo_token, expira_en_segundos]
      properties:
        token_acceso:
          type: string
        token_refresco:
          type: string
        tipo_token:
          type: string
          example: Bearer
        expira_en_segundos:
          type: integer
          example: 1800
    RespuestaTokenAcceso:
      type: object
      description: Nuevo token de acceso emitido al refrescar.
      required: [token_acceso, tipo_token, expira_en_segundos]
      properties:
        token_acceso:
          type: string
        tipo_token:
          type: string
          example: Bearer
        expira_en_segundos:
          type: integer
          example: 1800
    RespuestaUsuario:
      type: object
      description: Perfil público del usuario (sin hash de contraseña).
      required: [id, nombre_completo, correo, rol]
      properties:
        id:
          type: string
          format: uuid
        nombre_completo:
          type: string
          example: Ana Auditora
        correo:
          type: string
          format: email
          example: ana@empresa.com
        rol:
          type: string
