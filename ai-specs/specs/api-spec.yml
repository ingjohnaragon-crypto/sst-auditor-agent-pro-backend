      properties:
        empresa_id: {type: string, format: uuid}
        fecha: {type: string, format: date}
    SolicitudCalificarEstandar:
      type: object
      additionalProperties: false
      required: [resultado]
      properties:
        resultado: {type: string, enum: [CUMPLE, NO_CUMPLE, NO_APLICA]}
        observaciones: {type: string, nullable: true}
    RespuestaCalificacionEstandar:
      type: object
      required: [estandar_id, resultado, puntaje]
      properties:
        estandar_id: {type: string, format: uuid}
        resultado: {type: string, enum: [CUMPLE, NO_CUMPLE, NO_APLICA]}
        puntaje: {type: string, description: Decimal serializado}
        observaciones: {type: string, nullable: true}
    RespuestaAutoevaluacion:
      type: object
      required: [id, empresa_id, usuario_id, fecha, requiere_plan_mejora, calificaciones]
      properties:
        id: {type: string, format: uuid}
        empresa_id: {type: string, format: uuid}
        usuario_id: {type: string, format: uuid}
        fecha: {type: string, format: date}
        puntaje_total: {type: string, nullable: true}
        requiere_plan_mejora: {type: boolean}
        calificaciones:
          type: array
          items:
            $ref: "#/components/schemas/RespuestaCalificacionEstandar"
        fecha_creacion: {type: string, format: date-time}
        fecha_actualizacion: {type: string, format: date-time}
    RespuestaEstandarMinimo:
      type: object
      required: [id, ciclo_phva, numeral, descripcion, valor_porcentual]
      properties:
        id: {type: string, format: uuid}
        ciclo_phva: {type: string, enum: [PLANEAR, HACER, VERIFICAR, ACTUAR]}
        numeral: {type: string}
        descripcion: {type: string}
        valor_porcentual: {type: string}
    SolicitudCrearProcesoActividad:
      type: object
      additionalProperties: false
      required: [nombre, es_rutinaria]
      properties:
        nombre: {type: string, maxLength: 150}
        es_rutinaria: {type: boolean}
        zona_lugar: {type: string, nullable: true, maxLength: 150}
    SolicitudActualizarProcesoActividad:
      type: object
      additionalProperties: false
      properties:
        nombre: {type: string, maxLength: 150}
        es_rutinaria: {type: boolean}
        zona_lugar: {type: string, nullable: true, maxLength: 150}
    RespuestaProcesoActividad:
      type: object
      required: [id, empresa_id, nombre, es_rutinaria]
      properties:
        id: {type: string, format: uuid}
        empresa_id: {type: string, format: uuid}
        nombre: {type: string}
        es_rutinaria: {type: boolean}
        zona_lugar: {type: string, nullable: true}
        fecha_creacion: {type: string, format: date-time}
        fecha_actualizacion: {type: string, format: date-time}
    SolicitudCrearPeligro:
      type: object
      additionalProperties: false
      required: [clasificacion, descripcion]
      properties:
        clasificacion:
          type: string
          enum: [BIOLOGICO, FISICO, QUIMICO, PSICOSOCIAL, BIOMECANICO, CONDICIONES_SEGURIDAD, FENOMENOS_NATURALES]
        descripcion: {type: string}
        efectos_posibles: {type: string, nullable: true}
    SolicitudActualizarPeligro:
      type: object
      additionalProperties: false
      properties:
        clasificacion:
          type: string
          enum: [BIOLOGICO, FISICO, QUIMICO, PSICOSOCIAL, BIOMECANICO, CONDICIONES_SEGURIDAD, FENOMENOS_NATURALES]
        descripcion: {type: string}
        efectos_posibles: {type: string, nullable: true}
    RespuestaPeligro:
      type: object
      required: [id, proceso_actividad_id, clasificacion, descripcion]
      properties:
        id: {type: string, format: uuid}
        proceso_actividad_id: {type: string, format: uuid}
        clasificacion: {type: string}
        descripcion: {type: string}
        efectos_posibles: {type: string, nullable: true}
        fecha_creacion: {type: string, format: date-time}
        fecha_actualizacion: {type: string, format: date-time}
    SolicitudUpsertEvaluacion:
      type: object
      additionalProperties: false
      required: [nivel_deficiencia, nivel_exposicion, nivel_consecuencia]
      properties:
        nivel_deficiencia: {type: integer, enum: [10, 6, 2, 0]}
        nivel_exposicion: {type: integer, enum: [4, 3, 2, 1]}
        nivel_consecuencia: {type: integer, enum: [100, 60, 25, 10]}
    RespuestaEvaluacionRiesgo:
      type: object
      required:
        - id
        - peligro_id
        - nivel_deficiencia
        - nivel_exposicion
        - nivel_consecuencia
        - nivel_probabilidad
        - nivel_riesgo
        - interpretacion_nr
        - aceptabilidad
      properties:
        id: {type: string, format: uuid}
        peligro_id: {type: string, format: uuid}
        nivel_deficiencia: {type: integer}
        nivel_exposicion: {type: integer}
        nivel_consecuencia: {type: integer}
        nivel_probabilidad: {type: integer, description: Derivado NP = ND × NE}
        nivel_riesgo: {type: integer, description: Derivado NR = NP × NC}
        interpretacion_nr: {type: string, enum: [I, II, III, IV]}
        aceptabilidad:
          type: string
          enum: [NO_ACEPTABLE, ACEPTABLE_CON_CONTROL, MEJORABLE, ACEPTABLE]
        fecha_creacion: {type: string, format: date-time}
        fecha_actualizacion: {type: string, format: date-time}
    SolicitudCrearControl:
      type: object
      additionalProperties: false
      required: [tipo, descripcion]
      properties:
        tipo: {type: string, enum: [ELIMINACION, SUSTITUCION, INGENIERIA, ADMINISTRATIVO, EPP]}
        descripcion: {type: string}
    SolicitudActualizarControl:
      type: object
      additionalProperties: false
      properties:
        tipo: {type: string, enum: [ELIMINACION, SUSTITUCION, INGENIERIA, ADMINISTRATIVO, EPP]}
        descripcion: {type: string}
    RespuestaControlRiesgo:
      type: object
      required: [id, evaluacion_riesgo_id, tipo, descripcion]
      properties:
        id: {type: string, format: uuid}
        evaluacion_riesgo_id: {type: string, format: uuid}
        tipo: {type: string}
        descripcion: {type: string}
        fecha_creacion: {type: string, format: date-time}
        fecha_actualizacion: {type: string, format: date-time}
    RespuestaPeligroMatriz:
      type: object
      required: [peligro, controles]
      properties:
        peligro: {$ref: "#/components/schemas/RespuestaPeligro"}
        evaluacion:
          oneOf:
            - $ref: "#/components/schemas/RespuestaEvaluacionRiesgo"
            - type: "null"
        controles:
          type: array
          items: {$ref: "#/components/schemas/RespuestaControlRiesgo"}
    RespuestaProcesoMatriz:
      type: object
      required: [proceso, peligros]
      properties:
        proceso: {$ref: "#/components/schemas/RespuestaProcesoActividad"}
        peligros:
          type: array
          items: {$ref: "#/components/schemas/RespuestaPeligroMatriz"}
    RespuestaMatrizRiesgos:
      type: object
      required: [empresa_id, procesos]
      properties:
        empresa_id: {type: string, format: uuid}
        procesos:
          type: array
          items: {$ref: "#/components/schemas/RespuestaProcesoMatriz"}
    RespuestaError:
      type: object
      description: >
        Contrato único de toda respuesta de error del API (4xx y 5xx).
        Todas las rutas presentes y futuras responden errores con este esquema.
      required: [exito, codigo, mensaje]
      properties:
        exito:
          type: boolean
          description: Siempre `false` en respuestas de error.
          example: false
        codigo:
          type: string
          description: >
            Código estable en mayúsculas: ERROR_DOMINIO, ERROR_VALIDACION,
            ERROR_HTTP, ERROR_INTERNO o el código específico de una subclase
            de DomainException.
          example: ERROR_VALIDACION
        mensaje:
          type: string
          description: Descripción legible del error, en español.
          example: La petición contiene datos inválidos.
        detalle:
          description: >
            Información adicional (p. ej. errores de campo de Pydantic).
            `null` cuando no aplica.
          oneOf:
            - type: array
              items:
                type: object
            - type: object
            - type: "null"
  responses:
    ErrorPorDefecto:
      description: Respuesta de error con el esquema único `RespuestaError`.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RespuestaError"
          examples:
            errorValidacion:
              summary: 422 — error de validación
              value:
                exito: false
                codigo: ERROR_VALIDACION
                mensaje: La petición contiene datos inválidos.
                detalle:
                  - loc: [body, name]
                    msg: Field required
                    type: missing
            errorInterno:
              summary: 500 — error no controlado
              value:
                exito: false
                codigo: ERROR_INTERNO
                mensaje: Ha ocurrido un error interno. Contacte al administrador.
                detalle: null
