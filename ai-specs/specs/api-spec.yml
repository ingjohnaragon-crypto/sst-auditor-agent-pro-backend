      properties:
        razon_social: {type: string}
        nit: {type: string}
        actividad_economica: {type: string}
        nivel_riesgo_arl: {type: string, enum: [I, II, III, IV, V]}
        numero_trabajadores: {type: integer, exclusiveMinimum: 0}
    RespuestaEmpresa:
      type: object
      required: [id, razon_social, nit, actividad_economica, nivel_riesgo_arl, numero_trabajadores]
      properties:
        id: {type: string, format: uuid}
        razon_social: {type: string}
        nit: {type: string}
        actividad_economica: {type: string}
        nivel_riesgo_arl: {type: string, enum: [I, II, III, IV, V]}
        numero_trabajadores: {type: integer}
        fecha_creacion: {type: string, format: date-time}
        fecha_actualizacion: {type: string, format: date-time}
    SolicitudCrearAutoevaluacion:
      type: object
      additionalProperties: false
