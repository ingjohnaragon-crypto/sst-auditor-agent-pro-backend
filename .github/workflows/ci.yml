name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Validate CLI commands are executable
        run: |
          for cmd in .openspec-cli/commands/os-*; do
            [ -f "$cmd" ] && [ -x "$cmd" ] || chmod +x "$cmd"
          done
          echo "All CLI commands validated."

      - name: Syntax-check shell scripts (sh -n)
        run: |
          status=0
          for f in .openspec-cli/install.sh .openspec-cli/commands/os-* .openspec-cli/lib/*.sh; do
            [ -f "$f" ] || continue
            if ! sh -n "$f"; then
              echo "SYNTAX ERROR: $f"
              status=1
            fi
          done
          exit $status

      - name: Compile-check Python helper scripts
        run: |
          status=0
          for f in .openspec-cli/lib/*.py; do
            [ -f "$f" ] || continue
            if ! python -m py_compile "$f"; then
              echo "COMPILE ERROR: $f"
              status=1
            fi
          done
          exit $status

      - name: Run placeholder tests
        run: pytest tests/ -v
