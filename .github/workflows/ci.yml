name: CI

on:
  push:
    branches: [main, master, develop, chore/add-core-vault-spec]
  pull_request:
    branches: [main, master, develop]

jobs:
  vault-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install contracts_api SDK
        run: |
          pip install --upgrade pip
          cd contracts_sdk/contracts_sdk && pip install .

      - name: Install test dependencies
        run: pip install pytest pytest-cov

      - name: Run Vault lint (sandbox restriction check)
        run: python .openspec-cli/lib/vault_lint.py contracts/

      - name: Run vault_lint unit tests
        run: pytest tests/test_vault_lint.py -v --cov=vault_lint --cov-fail-under=90

      - name: Run Vault Smart Contract tests
        run: pytest tests/test_savings_product.py tests/test_current_account.py tests/test_fixed_term_deposit.py -v --cov=contracts --cov-report=xml --cov-fail-under=90

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
