# Hooks de calidad del proyecto — activar con: poetry run pre-commit install
# Se excluyen los directorios del framework OpenSpec (scripts y archivos generados por ticket).
exclude: '^(\.openspec-cli/|ai-specs/|openspec/)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Alineado con la versión de ruff del grupo dev de pyproject.toml.
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict, config del proyecto)
        # Hook local (no mirrors-mypy) para ejecutar con el entorno del proyecto:
        # usa la config strict de pyproject.toml y ve las dependencias reales.
        # `py -m poetry` evita depender de un `poetry` en PATH (p. ej. Git Bash en Windows).
        entry: py -m poetry run mypy
        language: system
        types: [python]
        pass_filenames: false
